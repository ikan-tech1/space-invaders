<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#060a14" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="OG Space Invaders" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=Orbitron:wght@700;900&family=Press+Start+2P&display=swap"
      rel="stylesheet"
    />
    <title>OG Space Invaders</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #060a14;
        color: #eef6ff;
        overflow: hidden;
      }
      .hidden {
        display: none !important;
      }
      #game-layer {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #0a0e1a;
      }
      #game-layer:not(.hidden) {
        display: flex;
      }
      #game-canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      #screen-root {
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="splash-overlay" class="splash-overlay hidden" aria-live="polite">
        <div class="splash-cabinet arcade-cabinet">
          <div class="arcade-frame" aria-hidden="true">
            <span class="arcade-corner arcade-corner-tl"></span>
            <span class="arcade-corner arcade-corner-tr"></span>
            <span class="arcade-corner arcade-corner-bl"></span>
            <span class="arcade-corner arcade-corner-br"></span>
            <span class="arcade-scanlines"></span>
            <span class="arcade-glow"></span>
          </div>
          <p class="splash-eyebrow"><span class="arcade-status-dot"></span> ARCADE ONLINE</p>
          <h1 class="splash-title"><span class="splash-og">OG</span> SPACE INVADERS</h1>
          <p class="splash-tagline">Classic Arcade Edition</p>
          <div class="splash-loader" role="progressbar" aria-label="Loading">
            <span class="splash-loader-bar"></span>
          </div>
          <p class="splash-status">Calibrating cabinet…</p>
        </div>
      </div>
      <div id="screen-root"></div>
      <div id="game-layer" class="hidden">
        <div class="crt-bezel">
          <canvas id="game-canvas"></canvas>
        </div>
        <div id="hud">
          <div class="hud-cabinet">
            <div class="hud-row">
              <div class="hud-stat">
                <span class="hud-label">Score</span>
                <span id="hud-score" class="hud-value hud-value--gold">0</span>
              </div>
              <div class="hud-stat hud-stat--center">
                <span class="hud-label">Level</span>
                <span id="hud-wave" class="hud-value hud-value--cyan">1</span>
              </div>
              <div class="hud-stat hud-stat--right">
                <span class="hud-label">Lives</span>
                <span id="hud-lives" class="hud-value hud-value--danger">♥♥♥</span>
              </div>
            </div>
          </div>
          <div class="hud-loadout">
            <div class="hud-meta">
              <span class="hud-meta-label">Ship</span>
              <span id="hud-ship-name" class="hud-meta-value">Striker</span>
            </div>
            <div id="hud-gun" class="hud-gun">
              <span class="hud-gun-label">Weapon</span>
              <span id="hud-gun-name" class="hud-gun-name">Solo Cannon</span>
            </div>
            <div class="hud-meta hud-meta--tokens">
              <span class="hud-meta-label">Wallet</span>
              <span id="hud-tokens" class="hud-meta-value hud-meta-value--gold">0</span>
            </div>
            <div class="hud-meta hud-meta--run-pool">
              <span class="hud-meta-label">Run</span>
              <span id="hud-run-pool" class="hud-meta-value hud-meta-value--cyan">0</span>
            </div>
          </div>
          <div id="hud-endless-mult" class="hud-endless hidden">×1.0 ENDLESS</div>
          <div id="hud-boss-weak" class="hud-boss-weak hidden">◎ WEAK POINT</div>
          <div id="hud-combo" class="hud-combo hidden">COMBO x1</div>
          <div id="hud-buffs" class="hud-buffs hidden" aria-label="Active buffs"></div>
        </div>
        <div id="wave-banner" class="wave-banner hidden"></div>
        <div id="sector-briefing-modal" class="hidden level-complete-overlay"></div>
        <div id="level-complete-modal" class="hidden level-complete-overlay"></div>
        <div id="slot-machine-overlay" class="hidden slot-machine-overlay"></div>
        <div id="pause-overlay" class="hidden">
          <div class="pause-cabinet">
            <div class="pause-cabinet-frame" aria-hidden="true">
              <span class="arcade-corner arcade-corner-tl"></span>
              <span class="arcade-corner arcade-corner-tr"></span>
              <span class="arcade-corner arcade-corner-bl"></span>
              <span class="arcade-corner arcade-corner-br"></span>
              <span class="arcade-scanlines"></span>
            </div>
            <p class="pause-title">PAUSED</p>
            <div class="screen-marquee pause-marquee" aria-hidden="true">
              <span>INSERT COIN TO RESUME</span>
            </div>
            <footer class="pause-footer">
              <button type="button" class="btn btn-primary btn-deploy" id="pause-resume">
                <span class="btn-deploy-label">Resume</span>
                <span class="btn-deploy-sub">Continue mission</span>
              </button>
              <p class="pause-hint"><kbd>P</kbd> or pause button</p>
            </footer>
          </div>
        </div>
        <div id="touch-controls">
          <div id="touch-move" aria-label="Move">
            <span class="touch-move-label">◀ DRAG ▶</span>
          </div>
          <button type="button" id="touch-fire" aria-label="Fire">
            <span class="touch-fire-label">FIRE</span>
          </button>
          <button type="button" id="touch-pause" aria-label="Pause">⏸</button>
        </div>
        <p id="keyboard-hint">← → move · SPACE fire · P pause</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
