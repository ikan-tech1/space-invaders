<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#06060f" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="NEON Siege" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />
    <title>NEON Siege — Space Invaders 2050</title>
    <style>
      html,
      body {
        margin: 0;
        height: 100%;
        background: #06060f;
        color: #e8f4ff;
        overflow: hidden;
      }
      .hidden {
        display: none !important;
      }
      #game-layer {
        position: fixed;
        inset: 0;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #06060f;
      }
      #game-layer:not(.hidden) {
        display: flex;
      }
      #game-canvas {
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      #screen-root {
        min-height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="screen-root"></div>
      <div id="game-layer" class="hidden">
        <canvas id="game-canvas"></canvas>
        <div id="hud">
          <div class="hud-row">
            <span id="hud-score">0</span>
            <span id="hud-wave">LEVEL 1</span>
            <span id="hud-lives">♥♥♥</span>
          </div>
          <div id="hud-weapon-row">
            <span id="hud-weapon">Pulse Carbine</span>
            <div class="bar-wrap"><div id="hud-xp-fill" class="bar-fill xp"></div></div>
            <div class="bar-wrap heat-wrap"><div id="hud-heat-fill" class="bar-fill heat"></div></div>
          </div>
          <div id="hud-combo" class="hidden">CHAIN x1</div>
          <div id="hud-powerups" class="hidden"></div>
          <div id="pickup-toast" class="hidden">
            <span id="pickup-toast-icon"></span>
            <span id="pickup-toast-text"></span>
          </div>
        </div>
        <div id="wave-banner" class="hidden"></div>
        <div id="boss-inbound" class="hidden"></div>
        <div id="level-complete-modal" class="hidden level-complete-overlay"></div>
        <div id="sector-briefing-modal" class="hidden level-complete-overlay"></div>
        <div id="levelup-flash" class="hidden"></div>
        <div id="pause-overlay" class="hidden">
          <div class="pause-panel">
            <p class="pause-title">PAUSED</p>
            <p id="pause-weapon" class="pause-stat"></p>
            <div id="pause-powerups" class="pause-powerups"></div>
            <ul class="pause-controls">
              <li>← → Move</li>
              <li>SPACE Hold fire / beam</li>
              <li>P Resume</li>
            </ul>
            <button type="button" id="pause-resume" class="btn btn-primary pause-resume-btn">Resume</button>
            <span class="hint">Press P or tap Resume</span>
          </div>
        </div>
        <div id="touch-controls">
          <div id="touch-move"></div>
          <button type="button" id="touch-fire">FIRE</button>
          <button type="button" id="touch-pause">⏸</button>
        </div>
        <p id="keyboard-hint">← → move · SPACE fire · P pause</p>
      </div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
